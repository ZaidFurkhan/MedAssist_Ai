<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Appointments | Smart CDSS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .appointments-page-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        .appointments-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }

        .appointments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .full-appointments-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .appointment-record {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .appointment-record:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-color);
        }

        .appt-info h4 {
            font-size: 1.2rem;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .appt-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .appt-date-box {
            background: var(--primary-light);
            color: var(--primary-color);
            padding: 0.75rem 1rem;
            border-radius: 12px;
            text-align: center;
            min-width: 120px;
        }

        .appt-date-box .day {
            font-size: 1.1rem;
            font-weight: 700;
            display: block;
        }

        .appt-date-box .time {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-badge {
            background: #d1fae5;
            color: #059669;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 0.5rem;
            display: inline-block;
        }

        .empty-state-full {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="background-shape shape-1"></div>
    <div class="background-shape shape-2"></div>

    <div class="appointments-page-container">
        <header class="header">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
            </div>
            <div>
                <h1>Your Appointments</h1>
                <p class="subtitle">History of all your scheduled consultations</p>
            </div>
        </header>

        <main class="appointments-card">
            <div class="appointments-header">
                <a href="javascript:history.back()" class="back-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back
                </a>
            </div>

            <div id="full-appointments-list" class="full-appointments-list">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Fetching your appointments...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const listContainer = document.getElementById('full-appointments-list');

            try {
                const res = await fetch('/api/user/data');
                const data = await res.json();

                if (!data.appointments || data.appointments.length === 0) {
                    listContainer.innerHTML = `
                        <div class="empty-state-full">
                            <h4>No appointments found</h4>
                            <p>Your scheduled consultations will appear here once you book them while logged in.</p>
                            <p style="font-size: 0.8rem; margin-top: 1rem; color: var(--text-secondary);">
                                * Note: Appointments booked in "Guest Mode" are not linked to your account.
                            </p>
                        </div>`;
                    return;
                }

                listContainer.innerHTML = data.appointments.map(a => {
                    return `
                        <div class="appointment-record">
                            <div class="appt-info">
                                <h4>${a.hospital_name}</h4>
                                <p><strong>Doctor:</strong> ${a.doctor_name}</p>
                                <p><strong>Patient:</strong> ${a.patient_name}</p>
                                <span class="status-badge">Confirmed ✅</span>
                            </div>
                            <div class="appt-date-box">
                                <span class="day">${a.appointment_date}</span>
                                <span class="time">${a.appointment_time}</span>
                            </div>
                        </div>
                     `;
                }).join('');

            } catch (err) {
                listContainer.innerHTML = '<div class="empty-state-full" style="color:#ef4444;">Failed to load appointments.</div>';
            }
        });
    </script>
</body>

</html>
