<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction History | Smart CDSS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .history-page-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        .history-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .full-history-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .history-record {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .history-record:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-color);
        }

        .record-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .record-disease {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .record-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .record-symptoms {
            font-size: 0.9rem;
            color: var(--text-secondary);
            background: var(--bg-color);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-top: 0.5rem;
        }

        .empty-state-full {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="background-shape shape-1"></div>
    <div class="background-shape shape-2"></div>

    <div class="history-page-container">
        <header class="header">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                </svg>
            </div>
            <div>
                <h1>Diagnosis History</h1>
                <p class="subtitle">All your previous AI predictions</p>
            </div>
        </header>

        <main class="history-card">
            <div class="history-header">
                <a href="javascript:history.back()" class="back-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back
                </a>
            </div>

            <div id="full-history-list" class="full-history-list">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Fetching your history...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const listContainer = document.getElementById('full-history-list');

            try {
                const res = await fetch('/api/user/data');
                const data = await res.json();

                if (!data.predictions || data.predictions.length === 0) {
                    listContainer.innerHTML = '<div class="empty-state-full"><h4>No history found</h4><p>Your disease predictions will appear here once you use the system.</p></div>';
                    return;
                }

                listContainer.innerHTML = data.predictions.map(p => {
                    const date = new Date(p.created_at).toLocaleString('en-US', {
                        month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit'
                    });

                    return `
                        <div class="history-record">
                            <div class="record-head">
                                <span class="record-disease">${p.predicted_disease}</span>
                                <span class="record-date">${date}</span>
                            </div>
                            <div class="record-symptoms">
                                <strong>Symptoms:</strong> ${p.symptoms.join(', ').replace(/_/g, ' ')}
                            </div>
                        </div>
                     `;
                }).join('');

            } catch (err) {
                listContainer.innerHTML = '<div class="empty-state-full" style="color:#ef4444;">Failed to load history.</div>';
            }
        });
    </script>
</body>

</html>
